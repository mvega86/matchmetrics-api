name: CI Backend

on:
  push:
    branches: [main, feature/develop]
  pull_request:
    branches: [main, feature/develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        run: ./mvnw verify -q
        env:
          JWT_SECRET: ci-test-secret-key-minimum-32-characters-ok
          EMAIL_STUB_ALLOWED: 'true'
