# ──────────────────────────────────────────────────────────
# Perfil: dev  (uso local — activar con --spring.profiles.active=dev)
# ──────────────────────────────────────────────────────────

# JWT — valor por defecto solo para desarrollo local; producción DEBE definir JWT_SECRET
app.security.jwt.secret=${JWT_SECRET:dev-local-secret-matchmetrics-change-in-production-1234567890}

# Base de datos local
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/api_party}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# JPA — mostrar SQL en consola para depuración
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logs — nivel DEBUG para código de aplicación en local
logging.level.org.flywaydb=INFO
logging.level.org.springframework.jdbc=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.matchmetrics=DEBUG
# Sin formato JSON estructurado en local (texto legible)
logging.structured.format.console=

# Email — stub permitido en local (no envía emails reales)
app.email.stub-allowed=true

# HikariCP — pool más generoso en local
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
