spring.application.name=matchmetrics-api

# Base de datos
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/api_party}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.create-schemas=false
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=true

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logs
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Security — set JWT_SECRET env var in production
app.security.jwt.secret=${JWT_SECRET:matchmetrics-super-secret-key-change-this-in-production-123456789}
app.security.jwt.expiration=86400000

# CORS — set CORS_ALLOWED_ORIGINS env var in production (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
app.base-url=http://localhost:8080

# Notifications — Email via Resend
app.resend.api-key=${RESEND_API_KEY:}
app.from-email=${APP_FROM_EMAIL:MatchMetrics <noreply@example.com>}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Notifications — SMS (disabled until provider configured)
app.sms.enabled=${SMS_ENABLED:false}

# Password reset rate limiting
app.password-reset.max-attempts=3