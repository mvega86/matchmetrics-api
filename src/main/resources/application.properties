spring.application.name=matchmetrics-api
server.port=${PORT:8080}

# Perfil activo por defecto en local — producción sobreescribe con SPRING_PROFILES_ACTIVE=prod
spring.profiles.default=dev

# Base de datos
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/api_party}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.create-schemas=false
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=true

# JPA / Hibernate — valores por perfil (dev/prod) sobrescriben estos defaults
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logs — defaults base; los perfiles dev/prod los sobrescriben
logging.level.org.flywaydb=WARN
logging.level.org.springframework.jdbc=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.matchmetrics=INFO
# Formato estructurado: vacío por defecto; prod activa ecs vía application-prod.properties
logging.structured.format.console=

# Security — JWT_SECRET debe estar siempre definido como variable de entorno (sin fallback)
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration=900000
app.security.jwt.refresh-expiration=604800000
# Set COOKIE_SECURE=true in production (HTTPS)
app.security.cookie.secure=${COOKIE_SECURE:false}
# Set COOKIE_SAME_SITE=None in production (cross-site, required with Secure=true)
app.security.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# CORS — en producción setear CORS_ALLOWED_ORIGINS=https://tudominio.com
# http://localhost:[*] acepta cualquier puerto local en dev (5173, 5174, 5176…)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:[*]}

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Notifications — Email via Resend
app.resend.api-key=${RESEND_API_KEY:}
app.from-email=${APP_FROM_EMAIL:MatchMetrics <noreply@example.com>}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
# Stub de email activo por defecto; producción debe establecer EMAIL_STUB_ALLOWED=false + RESEND_API_KEY
app.email.stub-allowed=${EMAIL_STUB_ALLOWED:true}

# Notifications — SMS (disabled until provider configured)
app.sms.enabled=${SMS_ENABLED:false}
app.sms.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.from-number=${TWILIO_FROM_NUMBER:}

# Password reset rate limiting
app.password-reset.max-attempts=3

# API rate limiting (peticiones por minuto)
app.rate-limit.live.max-requests-per-minute=60
app.rate-limit.stats.max-requests-per-minute=120

# HikariCP — defaults base; application-prod.properties optimiza para Render 512 MB
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator — solo /health expuesto públicamente
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
