spring.application.name=matchmetrics-api
server.port=${PORT:8080}

# Base de datos
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/api_party}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.create-schemas=false
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=true

# JPA / Hibernate — valores por perfil (dev/prod) sobrescriben estos defaults
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logs — defaults base; los perfiles dev/prod los sobrescriben
logging.level.org.flywaydb=WARN
logging.level.org.springframework.jdbc=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.matchmetrics=INFO
# Formato estructurado: vacío por defecto; prod activa ecs vía application-prod.properties
logging.structured.format.console=

# Security — set JWT_SECRET env var in production
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration=86400000

# CORS — set CORS_ALLOWED_ORIGINS env var in production (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Notifications — Email via Resend
app.resend.api-key=${RESEND_API_KEY:}
app.from-email=${APP_FROM_EMAIL:MatchMetrics <noreply@example.com>}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
# Stub de email desactivado por defecto; application-dev.properties lo activa en local
app.email.stub-allowed=${EMAIL_STUB_ALLOWED:false}

# Notifications — SMS (disabled until provider configured)
app.sms.enabled=${SMS_ENABLED:false}
app.sms.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.from-number=${TWILIO_FROM_NUMBER:}

# Password reset rate limiting
app.password-reset.max-attempts=3

# HikariCP — defaults base; application-prod.properties optimiza para Render 512 MB
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator — solo /health expuesto públicamente
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
