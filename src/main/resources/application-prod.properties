# ──────────────────────────────────────────────────────────
# Perfil: prod  (Render — activar con SPRING_PROFILES_ACTIVE=prod)
# ──────────────────────────────────────────────────────────

# JPA — sin SQL en logs de producción
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logs — nivel WARN en producción; formato JSON estructurado para ingestión
logging.level.org.flywaydb=WARN
logging.level.org.springframework.jdbc=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.matchmetrics=INFO
logging.structured.format.console=ecs

# Email — no permitir stub en producción (debe enviarse email real)
app.email.stub-allowed=false

# HikariCP — optimizado para Render 512 MB
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
