spring.application.name=matchmetrics-api-test

spring.datasource.url=jdbc:h2:mem:matchmetrics_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true

app.security.jwt.secret=matchmetrics-super-secret-key-change-this-in-production-123456789
app.security.jwt.expiration=86400000